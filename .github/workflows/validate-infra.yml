name: Validate Infrastructure

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'
      - 'azure.yaml'
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - 'azure.yaml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  validate-bicep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Azure CLI
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: echo "Azure CLI installed"

      - name: Validate Bicep syntax
        run: |
          az bicep build --file infra/main.bicep --stdout > /dev/null
          az bicep build --file infra/bicep/main.bicep --stdout > /dev/null
          echo "✅ All Bicep files compile successfully"

      - name: Lint Bicep
        run: |
          az bicep lint --file infra/main.bicep || true
          az bicep lint --file infra/bicep/main.bicep || true

  validate-terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9'

      - name: Terraform Format Check
        working-directory: infra/terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: infra/terraform
        run: terraform validate

  preview-deployment:
    runs-on: ubuntu-latest
    needs: [validate-bicep, validate-terraform]
    if: github.event_name == 'pull_request'
    environment: preview
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Initialize azd environment
        run: |
          azd env new ci-preview --no-prompt
          azd env set AZURE_LOCATION eastus --no-prompt
          azd env set AZURE_PRINCIPAL_ID "" --no-prompt

      - name: Preview infrastructure changes
        run: |
          azd provision --preview --no-prompt 2>&1 | tee provision-preview.txt
          echo "## 🏗️ Infrastructure Preview" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat provision-preview.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

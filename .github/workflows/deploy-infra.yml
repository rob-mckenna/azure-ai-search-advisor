name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
  workflow_dispatch:
    inputs:
      iac_tool:
        description: 'IaC tool to use'
        required: true
        default: 'bicep'
        type: choice
        options:
          - bicep
          - terraform

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: rg-search-advisor
  AZURE_LOCATION: eastus

jobs:
  deploy-bicep:
    if: github.event_name == 'push' || inputs.iac_tool == 'bicep'
    runs-on: ubuntu-latest
    environment: infrastructure

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        run: |
          az group create \
            --name ${{ env.AZURE_RESOURCE_GROUP }} \
            --location ${{ env.AZURE_LOCATION }} \
            --tags workload=azure-ai-search-advisor provisioner=bicep

      - name: Validate Bicep template
        run: |
          az deployment group validate \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infra/bicep/main.bicep \
            --parameters @infra/bicep/main.bicepparam \
            --parameters principalId="${{ secrets.AZURE_PRINCIPAL_ID }}"

      - name: Deploy Bicep template
        run: |
          az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infra/bicep/main.bicep \
            --parameters @infra/bicep/main.bicepparam \
            --parameters principalId="${{ secrets.AZURE_PRINCIPAL_ID }}" \
            --name "infra-$(date +%Y%m%d-%H%M%S)"

  deploy-terraform:
    if: inputs.iac_tool == 'terraform'
    runs-on: ubuntu-latest
    environment: infrastructure

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7'

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: infra/terraform
        run: |
          terraform plan \
            -var="resource_group_name=${{ env.AZURE_RESOURCE_GROUP }}" \
            -var="location=${{ env.AZURE_LOCATION }}" \
            -var="principal_id=${{ secrets.AZURE_PRINCIPAL_ID }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: infra/terraform
        run: terraform apply -auto-approve tfplan

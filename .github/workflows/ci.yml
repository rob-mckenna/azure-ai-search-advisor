name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
          pip install ruff pytest pytest-cov

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check
        run: |
          pip install mypy
          mypy src/ --ignore-missing-imports || true

      - name: Run tests
        run: pytest tests/ --cov=src/azure_ai_search_advisor --cov-report=xml -q

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build-docker:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t azure-ai-search-advisor:ci .

      - name: Verify container starts
        run: |
          docker run -d --name test-container -p 8000:8000 azure-ai-search-advisor:ci
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop test-container

name: Deploy UI to Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths:
      - "ui/**"
      - ".github/workflows/deploy-ui.yml"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - "ui/**"
      - ".github/workflows/deploy-ui.yml"
  workflow_dispatch:

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Build and deploy UI
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ui
          output_location: dist
        env:
          VITE_FOUNDRY_ENDPOINT: ${{ vars.VITE_FOUNDRY_ENDPOINT }}
          VITE_AZURE_CLIENT_ID: ${{ vars.VITE_AZURE_CLIENT_ID }}

  close_pull_request_preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close pull request preview
    steps:
      - name: Close Static Web App preview
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
